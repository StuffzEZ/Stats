<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Users — Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#090c10;--surface:#0d1117;--surface2:#161b22;--border:#21262d;--border2:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--purple:#bc8cff;--red:#f85149;--font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(88,166,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(88,166,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(9,12,16,0.9);backdrop-filter:blur(16px);}
  .nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{font-family:var(--mono);font-size:1rem;color:var(--accent);text-decoration:none;}
  .nav-logo span{color:var(--muted);}
  .nav-back{font-family:var(--mono);font-size:0.78rem;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);transition:all 0.2s;}
  .nav-back:hover{color:var(--text);border-color:var(--accent);}
  .page{max-width:1100px;margin:0 auto;padding:48px 24px 80px;position:relative;z-index:1;}
  h1{font-size:2rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:6px;}
  .subtitle{font-family:var(--mono);font-size:0.82rem;color:var(--muted);margin-bottom:32px;}

  .toolbar{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:200px;max-width:360px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;font-family:var(--mono);font-size:0.82rem;color:var(--text);outline:none;transition:border-color 0.2s;}
  .search:focus{border-color:var(--accent);}
  .sort-btn{font-family:var(--mono);font-size:0.75rem;color:var(--muted);background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:7px 14px;cursor:pointer;transition:all 0.2s;}
  .sort-btn:hover,.sort-btn.active{color:var(--text);border-color:var(--accent);}
  .count-badge{font-family:var(--mono);font-size:0.72rem;color:var(--muted);margin-left:auto;}

  .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}

  .user-card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:20px;text-decoration:none;transition:all 0.2s;display:flex;gap:14px;align-items:flex-start;
    position:relative;overflow:hidden;
  }
  .user-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity 0.3s;}
  .user-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
  .user-card:hover::before{opacity:1;}

  .user-avatar{width:48px;height:48px;border-radius:12px;border:2px solid var(--border2);flex-shrink:0;object-fit:cover;}
  .user-avatar-placeholder{width:48px;height:48px;border-radius:12px;border:2px solid var(--border2);flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;}

  .user-info{flex:1;min-width:0;}
  .user-name{font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-login{font-family:var(--mono);font-size:0.72rem;color:var(--muted);margin-bottom:8px;}
  .user-stats{display:flex;flex-wrap:wrap;gap:8px;}
  .user-stat{font-family:var(--mono);font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .user-updated{font-family:var(--mono);font-size:0.65rem;color:var(--muted);margin-top:8px;}

  .hire-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:0.65rem;padding:2px 8px;border-radius:100px;margin-top:6px;}
  .hire-open{background:rgba(63,185,80,0.1);color:var(--green);border:1px solid rgba(63,185,80,0.2);}
  .hire-freelance{background:rgba(210,153,34,0.1);color:#d29922;border:1px solid rgba(210,153,34,0.2);}
  .hire-no{background:rgba(248,81,73,0.08);color:var(--red);border:1px solid rgba(248,81,73,0.15);}

  .state-screen{text-align:center;padding:80px 20px;font-family:var(--mono);color:var(--muted);}
  .state-screen .big{font-size:3rem;margin-bottom:16px;}
  .state-screen h2{font-size:1.1rem;color:var(--text);margin-bottom:8px;}

  .spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin 0.7s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}


  .see-more-wrap-users{
    display:flex;align-items:center;justify-content:center;gap:14px;
    padding:28px 0 8px;
  }
  .see-more-btn-users{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:0.8rem;font-weight:600;
    color:var(--accent);
    background:rgba(88,166,255,0.06);
    border:1px solid rgba(88,166,255,0.2);
    border-radius:8px;padding:9px 20px;cursor:pointer;
    transition:all 0.2s;outline:none;
  }
  .see-more-btn-users:hover{
    background:rgba(88,166,255,0.12);
    border-color:rgba(88,166,255,0.4);
    transform:translateY(-1px);box-shadow:0 4px 16px rgba(88,166,255,0.15);
  }
  .see-more-btn-users .chev{transition:transform 0.25s ease;display:inline-block;}
  .see-more-btn-users.expanded .chev{transform:rotate(180deg);}
  .see-more-users-count{font-family:var(--mono);font-size:0.72rem;color:var(--muted);}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">stats<span>/</span>hub</a>
    <a class="nav-back" href="index.html">← Home</a>
  </div>
</nav>

<div class="page">
  <h1>👥 Registered Users</h1>
  <p class="subtitle">Everyone who has set up Stats and submitted a .txtdb file.</p>

  <div class="toolbar">
    <input class="search" type="text" placeholder="Search users…" id="search-input" oninput="filterUsers()"/>
    <button class="sort-btn active" id="sort-updated" onclick="sortBy('updated')">Recently Updated</button>
    <button class="sort-btn" id="sort-stars"   onclick="sortBy('stars')">Most Stars</button>
    <button class="sort-btn" id="sort-alpha"   onclick="sortBy('alpha')">A–Z</button>
    <span class="count-badge" id="user-count"></span>
  </div>

  <div id="users-container">
    <div class="state-screen">
      <div class="spinner"></div>
      <h2>Loading users…</h2>
    </div>
  </div>
</div>

<script>
const REPO_OWNER = 'StuffzEZ';
const REPO_NAME  = 'Stats';
const RAW_BASE   = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main`;

let allUsers = [];
let sortMode = 'updated';

async function loadUsers() {
  try {
    // List all files in db/
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/db`);
    if (!res.ok) throw new Error(`${res.status}`);
    const files = await res.json();

    const txtdbFiles = files.filter(f => f.name.endsWith('.txtdb') && f.name !== 'example.txtdb');

    if (!txtdbFiles.length) {
      document.getElementById('users-container').innerHTML = `
        <div class="state-screen">
          <div class="big">🌱</div>
          <h2>No users yet</h2>
          <p style="margin-top:8px">Be the first! <a href="setup.html" style="color:var(--accent)">Set up Stats →</a></p>
        </div>`;
      return;
    }

    // Fetch and parse each txtdb in parallel (capped at 20 concurrent)
    const chunks = [];
    for (let i = 0; i < txtdbFiles.length; i += 20) chunks.push(txtdbFiles.slice(i, i+20));

    for (const chunk of chunks) {
      const parsed = await Promise.allSettled(chunk.map(f => fetchAndParseTxtdb(f.name)));
      parsed.forEach(r => { if (r.status === 'fulfilled' && r.value) allUsers.push(r.value); });
    }

    renderUsers();
  } catch(e) {
    document.getElementById('users-container').innerHTML = `
      <div class="state-screen">
        <div class="big">⚠️</div>
        <h2>Could not load users</h2>
        <p>${e.message}</p>
      </div>`;
  }
}

async function fetchAndParseTxtdb(filename) {
  try {
    const res = await fetch(`${RAW_BASE}/db/${filename}`);
    if (!res.ok) return null;
    const text = await res.text();
    return parseTxtdb(text);
  } catch { return null; }
}

function parseTxtdb(text) {
  const lines   = text.split('\n');
  const result  = { _raw: text };
  let section   = '';

  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const sectionMatch = line.match(/^\[(.+)\]$/);
    if (sectionMatch) { section = sectionMatch[1]; continue; }
    const kvMatch = line.match(/^([^=]+?)\s*=\s*(.*)$/);
    if (kvMatch) {
      const key = kvMatch[1].trim();
      const val = kvMatch[2].trim();
      result[`${section}.${key}`] = val;
    }
  }
  return result;
}

function getField(user, key, fallback='') {
  return user[key] || fallback;
}

const USERS_INITIAL = 12;
let usersShowing = USERS_INITIAL;

function renderUsers(resetCount) {
  if (resetCount) usersShowing = USERS_INITIAL;

  let users = [...allUsers].filter(u => getField(u,'meta.username'));

  const q = document.getElementById('search-input').value.toLowerCase();
  if (q) {
    users = users.filter(u =>
      getField(u,'meta.username').toLowerCase().includes(q) ||
      getField(u,'meta.display_name').toLowerCase().includes(q) ||
      getField(u,'public_stats.bio').toLowerCase().includes(q)
    );
  }

  if (sortMode === 'updated') {
    users.sort((a,b) => new Date(getField(b,'meta.last_updated','0')) - new Date(getField(a,'meta.last_updated','0')));
  } else if (sortMode === 'stars') {
    users.sort((a,b) => parseInt(getField(b,'public_stats.total_stars','0')) - parseInt(getField(a,'public_stats.total_stars','0')));
  } else {
    users.sort((a,b) => getField(a,'meta.username').localeCompare(getField(b,'meta.username')));
  }

  document.getElementById('user-count').textContent = `${users.length} user${users.length!==1?'s':''}`;

  if (!users.length) {
    document.getElementById('users-container').innerHTML = `
      <div class="state-screen"><div class="big">🔍</div><h2>No results for "${q}"</h2></div>`;
    return;
  }

  const visible   = users.slice(0, usersShowing);
  const remaining = users.length - usersShowing;

  const seeMoreHtml = remaining > 0 ? `
    <div class="see-more-wrap-users">
      <button class="see-more-btn-users" id="users-more-btn" onclick="showMoreUsers()">
        Show ${Math.min(remaining, 12)} more
        <span class="chev">▼</span>
      </button>
      <span class="see-more-users-count">${usersShowing} of ${users.length} shown</span>
    </div>` : `
    <div style="text-align:center;padding:20px 0;font-family:var(--mono);font-size:0.72rem;color:var(--muted)">
      All ${users.length} users shown
    </div>`;

  document.getElementById('users-container').innerHTML = `
    <div class="users-grid" id="users-grid">${visible.map(renderCard).join('')}</div>
    ${seeMoreHtml}`;
}

function showMoreUsers() {
  usersShowing += 12;
  renderUsers(false);
  // Scroll to the new cards smoothly
  const grid = document.getElementById('users-grid');
  if (grid) {
    const lastCard = grid.lastElementChild;
    if (lastCard) lastCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function renderCard(u) {
  const username    = getField(u,'meta.username');
  const displayName = getField(u,'meta.display_name', username);
  const avatar      = getField(u,'public_stats.avatar_url') ||
                      `https://avatars.githubusercontent.com/${username}`;
  const stars       = parseInt(getField(u,'public_stats.total_stars','0'));
  const repos       = parseInt(getField(u,'public_stats.public_repos','0'));
  const followers   = parseInt(getField(u,'public_stats.followers','0'));
  const commits     = getField(u,'public_stats.public_commits_est','');
  const lastUpdated = getField(u,'meta.last_updated','');
  const hire        = getField(u,'custom.hire_status','');
  const note        = getField(u,'custom.note','');
  const statsUrl    = `stats.html?user=${username}`;

  const lastUpdatedFmt = lastUpdated
    ? `${Math.floor((Date.now()-new Date(lastUpdated))/3600000)}h ago`
    : '';

  const hireBadge = hire === 'open_to_work'
    ? `<span class="hire-badge hire-open">🟢 Open to work</span>`
    : hire === 'freelance'
    ? `<span class="hire-badge hire-freelance">🟡 Freelance</span>`
    : hire === 'not_looking'
    ? `<span class="hire-badge hire-no">🔴 Not looking</span>`
    : '';

  return `
    <a class="user-card" href="${statsUrl}">
      <img class="user-avatar" src="${avatar}&s=96" alt="${username}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="user-avatar-placeholder" style="display:none">👤</div>
      <div class="user-info">
        <div class="user-name">${displayName}</div>
        <div class="user-login">@${username}</div>
        <div class="user-stats">
          ${stars   ? `<span class="user-stat">⭐ ${stars.toLocaleString()}</span>` : ''}
          ${repos   ? `<span class="user-stat">📦 ${repos}</span>` : ''}
          ${followers?`<span class="user-stat">👥 ${followers}</span>`:''}
          ${commits  ?`<span class="user-stat">💬 ${commits}+</span>`:''}
        </div>
        ${note ? `<div style="font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${note}</div>` : ''}
        ${hireBadge}
        ${lastUpdatedFmt ? `<div class="user-updated">Updated ${lastUpdatedFmt}</div>` : ''}
      </div>
    </a>`;
}

function filterUsers() { renderUsers(true); }

function sortBy(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`sort-${mode}`).classList.add('active');
  renderUsers(true);
}

loadUsers();
</script>
</body>
</html>
